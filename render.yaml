databases:
  - name: probable-db
    databaseName: probable
    plan: basic-256mb
    region: oregon

services:
  - type: redis
    name: probable-redis
    plan: free
    region: oregon
    ipAllowList: []

  - type: web
    name: probable-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: probable-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: probable-redis
          property: connectionString
      - key: POLYGON_RPC_URL
        value: https://polygon-bor-rpc.publicnode.com
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: BUILDER_API_KEY
        sync: false
      - key: BUILDER_SECRET
        sync: false
      - key: BUILDER_PASSPHRASE
        sync: false
      - key: BUILDER_CODE
        sync: false
